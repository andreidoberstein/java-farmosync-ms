spring:
  data:
    mongodb:
      uri: ${SPRING_DATA_MONGODB_URI}
  kafka:
    bootstrap-servers: ${SPRING_KAFKA_BOOTSTRAP_SERVERS}
    properties:
      security:
        protocol: SASL_SSL
      sasl:
        mechanism: PLAIN
        jaas:
          config: org.apache.kafka.common.security.plain.PlainLoginModule required username="${SPRING_KAFKA_USERNAME}" password="${SPRING_KAFKA_PASSWORD}";

app:
  cors:
    allowed-origins: ${APP_CORS_ALLOWED_ORIGINS}
